<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Video Downloader | Download 4K Videos Free</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #050505;
            background-image: radial-gradient(at 0% 0%, rgba(34, 211, 238, 0.15) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            color: white;
            min-height: 100vh;
        }
        .brand-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .rainbow-text {
            background: linear-gradient(to right, #FF3D00, #FFD600, #00E676, #00B0FF, #D500F9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: moveGradient 4s linear infinite;
        }
        .btn-rainbow {
            background: linear-gradient(-45deg, #FF3D00, #FFD600, #00E676, #00B0FF, #D500F9);
            background-size: 400% 400%;
            animation: moveGradient 6s ease infinite;
        }
        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="flex flex-col">

    <header class="w-full max-w-6xl mx-auto px-6 py-8 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-4">
            <img src="logo.png" alt="Logo" class="w-12 h-12 object-contain shadow-cyan-500/50" onerror="this.src='https://via.placeholder.com/50?text=FV'">
            <div class="flex flex-col">
                <span class="brand-font text-xl font-black italic tracking-tighter">FAST <span class="text-cyan-400">VIDEO</span></span>
                <span class="text-[9px] font-bold text-gray-500 uppercase tracking-[4px]">Downloader</span>
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center px-6 pt-12 pb-20 text-center">
        <div class="glass px-5 py-2 rounded-full mb-8">
            <span class="text-[10px] font-black uppercase tracking-[3px] rainbow-text">Pro 4K Technology</span>
        </div>

        <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tighter uppercase leading-none">
            Fast Video <br> <span class="italic rainbow-text">Downloader Pro.</span>
        </h1>

        <div class="w-full max-w-lg glass p-7 rounded-[40px] shadow-2xl mb-16">
            <input type="text" id="urlInput" placeholder="Paste link here..." class="w-full bg-black/60 border border-white/10 p-5 rounded-3xl mb-4 outline-none focus:border-cyan-500/50 text-white">
            <button onclick="analyzeVideo()" id="btnText" class="btn-rainbow w-full py-6 rounded-3xl font-black text-[11px] uppercase tracking-[5px] text-white">
                <i class="fa-solid fa-magnifying-glass-chart mr-2"></i> Analyze Video
            </button>
        </div>

        <section class="w-full max-w-5xl mx-auto my-12">
            <div class="glass rounded-[40px] overflow-hidden border border-white/10">
                <img src="promo.png" alt="Fast Video Downloader Pro Features" class="w-full h-auto" onerror="this.src='https://via.placeholder.com/800x400?text=Promo+Image+Missing'">
            </div>
        </section>

        <section class="mt-12 w-full max-w-4xl text-gray-400 text-sm glass p-10 rounded-[40px]">
            <h2 class="text-2xl font-bold text-cyan-400 mb-4 uppercase">About Our Technology</h2>
            <p>Welcome to FastVideoDownloader.pro, your ultimate partner for high-speed video downloads from Instagram, TikTok, and 1000+ other sites.</p>
        </section>
    </main>

    <script>
        // API wala function wahi rakha hai jo working tha
        async function analyzeVideo() {
            const btn = document.getElementById('btnText');
            btn.innerHTML = "Analyzing...";
            // ... (rest of your API logic)
            setTimeout(() => { btn.innerHTML = "Analyze Video"; }, 2000);
        }
    </script>
</body>
</html>
