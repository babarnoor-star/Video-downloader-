<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST VIDEO | Premium Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Inter:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #030303;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .brand-font { font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }

        /* Unique Rainbow Animated Button */
        .unique-btn {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 5s ease infinite;
            border: none;
            transition: 0.5s;
            box-shadow: 0 4px 15px rgba(35, 166, 213, 0.3);
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .unique-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(35, 166, 213, 0.5);
        }

        .unique-btn:active { transform: scale(0.97); }

        /* Glassmorphism Input */
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .glass-input:focus {
            border-color: #23a6d5;
            box-shadow: 0 0 15px rgba(35, 166, 213, 0.3);
            background: rgba(255, 255, 255, 0.06);
        }

        /* Subtle Background Glows */
        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
            filter: blur(60px);
        }
    </style>
</head>
<body>

    <div class="bg-glow" style="top: -100px; right: -50px;"></div>
    <div class="bg-glow" style="bottom: -100px; left: -50px;"></div>

    <nav class="flex justify-between items-center px-6 py-4 max-w-5xl mx-auto w-full border-b border-white/5">
        <div class="brand-font text-xl font-black italic tracking-tighter">
            FAST <span class="text-cyan-400 text-2xl">VIDEO</span>
        </div>
        <div class="hidden md:flex gap-6 text-[10px] uppercase tracking-widest font-bold text-gray-500">
            <a href="#" class="hover:text-cyan-400 transition">Home</a>
            <a href="#" class="hover:text-cyan-400 transition">Features</a>
            <a href="#" class="hover:text-cyan-400 transition">Status</a>
        </div>
        <div class="text-[10px] uppercase tracking-widest text-cyan-400/50 font-bold md:hidden">
            v1.0 Pro
        </div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center px-6 text-center mt-10 mb-16">
        
        <span class="bg-white/5 text-cyan-400 border border-cyan-400/10 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 inline-block">
            <i class="fa-solid fa-robot mr-1"></i> AI Powered Fetch
        </span>

        <h1 class="text-4xl md:text-6xl font-extrabold mb-3 leading-tight brand-font">
            INSTANT <br> <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 text-5xl md:text-7xl">DOWNLOAD.</span>
        </h1>
        
        <p class="text-gray-400 text-sm max-w-xs mb-10 font-medium">Download high-quality videos from any platform instantly. Zero limits.</p>

        <div class="w-full max-w-md space-y-3">
            <div class="relative">
                <i class="fa-solid fa-link absolute left-4 top-1/2 -translate-y-1/2 text-gray-600"></i>
                <input type="text" id="urlInput" placeholder="Paste video link here..." 
                       class="w-full glass-input p-4 pl-12 rounded-xl outline-none text-base text-center placeholder:text-gray-700">
            </div>
            
            <button onclick="analyzeVideo()" id="btnText" class="unique-btn w-full py-4 rounded-xl font-extrabold text-sm uppercase tracking-wider text-white">
                <i class="fa-solid fa-bolt-lightning mr-2"></i> Start Analyzing
            </button>
        </div>

        <div id="result" class="mt-10 hidden w-full max-w-md animate-pulse">
            <div class="bg-white/5 p-5 rounded-2xl border border-white/10 backdrop-blur-md">
                <p id="videoTitle" class="text-cyan-400 font-bold mb-4 italic text-sm uppercase tracking-tight">Processing Link...</p>
                <div id="downloadButtons">
                    </div>
            </div>
        </div>
    </main>

    <footer class="py-8 text-center text-gray-700 text-[9px] tracking-[4px] uppercase border-t border-white/5">
        Built for Speed • FAST VIDEO TOOL © 2026
    </footer>

    <script src="script.js"></script>
</body>
</html>
