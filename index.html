<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST VIDEO | Pro Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Plus+Jakarta+Sans:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; min-height: 100vh; }
        .brand-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-rainbow {
            background: linear-gradient(-45deg, #FF3D00, #FFD600, #00E676, #00B0FF, #D500F9);
            background-size: 400% 400%;
            animation: gradientMove 6s ease infinite;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="flex flex-col items-center">

    <header class="w-full max-w-5xl px-6 py-6 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="brand-font text-xl font-black italic tracking-tighter text-cyan-400">FAST VIDEO</span>
        </div>
        <div class="text-[10px] uppercase font-bold text-gray-500">v1.0 Pro</div>
    </header>

    <main class="flex-1 flex flex-col items-center px-6 pt-10 text-center w-full max-w-lg">
        <h1 class="text-4xl md:text-6xl font-black mb-4 leading-tight">Download <br><span class="text-cyan-400">Any Video.</span></h1>
        
        <div class="w-full glass p-5 rounded-[28px] mt-6">
            <input type="text" id="urlInput" placeholder="Paste link here..." 
                class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl outline-none mb-4 text-center text-sm">
            
            <button onclick="analyzeVideo()" id="btnText" class="btn-rainbow w-full py-4 rounded-2xl font-black text-xs uppercase tracking-widest text-white shadow-xl">
                ANALYZE LINK
            </button>
        </div>

        <div id="result" class="hidden w-full mt-8">
            <div class="bg-white/5 border border-white/10 p-6 rounded-[28px]">
                <div id="downloadButtons" class="flex flex-col gap-3"></div>
            </div>
        </div>
    </main>

    <footer class="py-10 text-[9px] text-gray-800 tracking-[5px]">FAST VIDEO TOOL © 2026</footer>

    <script>
    async function analyzeVideo() {
        const urlInput = document.getElementById('urlInput');
        const btnText = document.getElementById('btnText');
        const resultDiv = document.getElementById('result');
        const downloadButtons = document.getElementById('downloadButtons');

        if (!urlInput.value.trim()) {
            alert("Pehle link paste karein!");
            return;
        }

        btnText.innerText = "FETCHING VIDEO...";
        btnText.disabled = true;
        resultDiv.classList.add('hidden');

        try {
            const response = await fetch('https://auto-download-all-in-one.p.rapidapi.com/v1/social/autolink', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-rapidapi-host': 'auto-download-all-in-one.p.rapidapi.com',
                    'x-rapidapi-key': '0733c17d56mshbb4fd563fb1aad0p15cca4jsnb616ddd8461e'
                },
                body: JSON.stringify({ url: urlInput.value.trim() })
            });

            const res = await response.json();
            console.log("API Response:", res);

            // Is API mein links "medias" array ke andar hote hain
            if (res.medias && res.medias.length > 0) {
                resultDiv.classList.remove('hidden');
                downloadButtons.innerHTML = '<p class="text-cyan-400 text-[10px] font-bold mb-2">LINKS FOUND!</p>';

                res.medias.forEach(item => {
                    downloadButtons.innerHTML += `
                        <a href="${item.url}" target="_blank" class="w-full py-4 bg-white/10 hover:bg-cyan-500 hover:text-black border border-white/10 rounded-xl font-black text-xs uppercase tracking-widest transition-all mb-2">
                            Download ${item.quality} (${item.extension})
                        </a>
                    `;
                });
                resultDiv.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("API ne koi link nahi dhoonda. Doosra link try karein.");
            }
        } catch (err) {
            alert("Server error! Please try again.");
        } finally {
            btnText.innerText = "ANALYZE LINK";
            btnText.disabled = false;
        }
    }
    </script>
</body>
</html>
