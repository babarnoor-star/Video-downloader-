<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .gradient-text {
            background: linear-gradient(to bottom, #fff 20%, #ff8a00 50%, #22c55e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }
        .analyze-btn {
            background: linear-gradient(to right, #22d3ee, #a3ff1a);
            color: #000;
            font-weight: 800;
        }
        .pro-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #1a1a1a;
            border-radius: 50px;
        }
    </style>
</head>
<body class="flex flex-col items-center pt-10 px-4">

    <div class="self-start mb-16">
        <div class="flex items-center gap-2">
            <div class="bg-cyan-500 p-2 rounded-lg text-black"><i class="fa-solid fa-bolt"></i></div>
            <h1 class="text-xl font-black italic tracking-tighter text-cyan-400">FAST VIDEO <span class="text-white text-[10px] block -mt-2 font-normal not-italic tracking-widest uppercase">DOWNLOADER</span></h1>
        </div>
    </div>

    <div class="text-center mb-10">
        <div class="border border-cyan-900/50 px-4 py-1 rounded-full text-[10px] text-cyan-400 font-bold mb-6 inline-block tracking-widest uppercase">PRO 4K TECHNOLOGY</div>
        <h2 class="text-6xl md:text-8xl gradient-text uppercase tracking-tighter leading-none">FAST VIDEO<br>DOWNLOADER<br>PRO.</h2>
    </div>

    <div class="w-full max-w-2xl pro-box p-8 mb-16 border border-zinc-900">
        <div class="relative flex items-center mb-5">
            <i class="fa-solid fa-link absolute left-5 text-zinc-600"></i>
            <input type="text" id="videoUrl" placeholder="Paste link here..." class="w-full bg-black/50 border border-zinc-800 p-5 pl-14 rounded-2xl outline-none text-white">
        </div>
        <button onclick="fetchVideo()" class="w-full py-5 analyze-btn uppercase tracking-[0.2em] text-sm rounded-3xl">ANALYZE VIDEO</button>
    </div>

    <div class="flex justify-around w-full max-w-2xl mb-20 text-center border-b border-zinc-900 pb-12">
        <div><h4 class="text-orange-500 text-3xl font-black italic">1000+</h4><p class="text-[10px] text-zinc-500 uppercase font-bold tracking-widest">Sites</p></div>
        <div><h4 class="text-green-500 text-3xl font-black italic">4K</h4><p class="text-[10px] text-zinc-500 uppercase font-bold tracking-widest">Quality</p></div>
        <div><h4 class="text-orange-500 text-3xl font-black italic">FAST</h4><p class="text-[10px] text-zinc-500 uppercase font-bold tracking-widest">Server</p></div>
    </div>

    <div id="loading" class="hidden mb-10"><i class="fa-solid fa-spinner animate-spin text-4xl text-cyan-500"></i></div>
    <div id="resultArea" class="hidden w-full max-w-xl mb-20">
        <div class="bg-zinc-900 rounded-[2.5rem] p-5 border border-zinc-800">
            <img id="thumb" src="" class="w-full rounded-3xl mb-5">
            <h3 id="videoTitle" class="text-center font-bold mb-5"></h3>
            <div id="downloadButtons" class="grid gap-2"></div>
        </div>
    </div>

    <footer class="w-full py-10 text-center border-t border-zinc-900 mt-auto">
        <div class="flex justify-center gap-6 mb-4 text-orange-400 font-bold text-sm">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">Contact Us</a>
        </div>
        <p class="text-[10px] text-zinc-600 uppercase tracking-widest">© 2026 Fast Video Downloader Pro. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
