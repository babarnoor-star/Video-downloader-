<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST VIDEO | Final Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Plus+Jakarta+Sans:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; min-height: 100vh; }
        .brand-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-rainbow {
            background: linear-gradient(-45deg, #FF3D00, #FFD600, #00E676, #00B0FF, #D500F9);
            background-size: 400% 400%;
            animation: gradientMove 6s ease infinite;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="flex flex-col items-center px-6">

    <header class="w-full max-w-lg py-12 flex justify-between items-center">
        <span class="brand-font text-2xl font-black text-cyan-400 italic">FAST VIDEO</span>
        <div class="glass px-3 py-1 rounded-full text-[9px] font-bold text-gray-500 uppercase tracking-widest">v1.5 Final</div>
    </header>

    <main class="w-full max-w-lg">
        <div class="glass p-8 rounded-[35px] text-center mb-10 shadow-2xl shadow-cyan-500/5">
            <h1 class="text-5xl font-black mb-8 leading-tight tracking-tighter">Save <br><span class="text-cyan-400 italic">Anything.</span></h1>
            
            <input type="text" id="urlInput" placeholder="Paste link here..." 
                class="w-full bg-black/50 border border-white/10 p-5 rounded-2xl outline-none mb-4 text-center text-sm focus:border-cyan-500 transition-all placeholder:text-gray-700">
            
            <button onclick="analyzeVideo()" id="btnText" class="btn-rainbow w-full py-5 rounded-2xl font-black text-[10px] uppercase tracking-[4px] text-white shadow-xl active:scale-95 transition-transform">
                START ANALYSIS
            </button>
        </div>

        <div id="result" class="hidden">
            <div class="bg-white/5 border border-white/10 p-8 rounded-[35px] backdrop-blur-3xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-400 to-purple-600"></div>
                <div id="downloadButtons" class="flex flex-col gap-4"></div>
            </div>
        </div>
    </main>

    <script>
    // 1-Click Download Logic (No Next Page)
    async function forceDownload(url, filename, btn) {
        const originalContent = btn.innerHTML;
        try {
            btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> SAVING...';
            btn.style.pointerEvents = "none";
            
            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename || 'fastvideo_download.mp4';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(blobUrl);
        } catch (e) {
            // Backup agar browser block kare
            window.location.href = url;
        } finally {
            btn.innerHTML = originalContent;
            btn.style.pointerEvents = "auto";
        }
    }

    async function analyzeVideo() {
        const urlInput = document.getElementById('urlInput');
        const btnText = document.getElementById('btnText');
        const resultDiv = document.getElementById('result');
        const downloadButtons = document.getElementById('downloadButtons');

        if (!urlInput.value.trim()) return alert("Please paste a link!");

        btnText.innerText = "WAITING FOR SERVER...";
        btnText.disabled = true;
        resultDiv.classList.add('hidden');

        try {
            const response = await fetch('https://auto-download-all-in-one.p.rapidapi.com/v1/social/autolink', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-rapidapi-host': 'auto-download-all-in-one.p.rapidapi.com',
                    'x-rapidapi-key': '0733c17d56mshbb4fd563fb1aad0p15cca4jsnb616ddd8461e'
                },
                body: JSON.stringify({ url: urlInput.value.trim() })
            });

            const res = await response.json();

            if (res.medias && res.medias.length > 0) {
                resultDiv.classList.remove('hidden');
                downloadButtons.innerHTML = '<p class="text-cyan-400 text-[10px] font-black mb-6 uppercase tracking-[3px]">Choose Quality:</p>';

                res.medias.forEach((item, index) => {
                    const isHD = item.quality.includes('1080') || item.quality.includes('4K');
                    downloadButtons.innerHTML += `
                        <button onclick="forceDownload('${item.url}', 'video_${index}.mp4', this)" 
                           class="w-full py-5 ${isHD ? 'bg-cyan-500 text-black shadow-lg shadow-cyan-500/20' : 'bg-white/5 text-white border border-white/10'} rounded-2xl font-black text-[11px] uppercase tracking-widest transition-all flex justify-between px-8 items-center group">
                            <span>${item.quality} ${item.extension.toUpperCase()}</span>
                            <i class="fa-solid fa-download group-hover:translate-y-1 transition-transform"></i>
                        </button>
                    `;
                });
                resultDiv.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("No links found!");
            }
        } catch (err) {
            alert("API Error!");
        } finally {
            btnText.innerText = "START ANALYSIS";
            btnText.disabled = false;
        }
    }
    </script>
</body>
</html>
