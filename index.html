<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST VIDEO | Pro Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Plus+Jakarta+Sans:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; min-height: 100vh; overflow-x: hidden; }
        .brand-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-rainbow {
            background: linear-gradient(-45deg, #FF3D00, #FFD600, #00E676, #00B0FF, #D500F9);
            background-size: 400% 400%;
            animation: gradientMove 6s ease infinite;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="flex flex-col items-center">

    <header class="w-full max-w-5xl px-6 py-8 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-cyan-500 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(6,182,212,0.5)]">
                <i class="fa-solid fa-bolt-lightning text-black text-sm"></i>
            </div>
            <span class="brand-font text-xl font-black italic tracking-tighter text-white">FAST<span class="text-cyan-400">VIDEO</span></span>
        </div>
        <div class="glass px-3 py-1 rounded-full text-[9px] font-bold text-cyan-400 border-cyan-500/20 uppercase tracking-widest">v1.2 Stable</div>
    </header>

    <main class="flex-1 flex flex-col items-center px-6 pt-10 text-center w-full max-w-lg">
        <div class="glass px-4 py-2 rounded-full mb-6 border-white/5 animate-float">
            <span class="text-[9px] font-bold uppercase tracking-[3px] text-gray-400">Unlimited 4K Downloads</span>
        </div>

        <h1 class="text-5xl md:text-7xl font-black mb-6 leading-[0.9]">FAST <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 italic">DOWNLOAD.</span></h1>
        
        <div class="w-full glass p-6 rounded-[32px] mt-4 shadow-2xl shadow-cyan-500/5">
            <div class="relative group">
                <i class="fa-solid fa-link absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-cyan-400 transition-colors"></i>
                <input type="text" id="urlInput" placeholder="Paste Video Link Here..." 
                    class="w-full bg-black/40 border border-white/10 p-5 pl-12 rounded-2xl outline-none mb-4 text-sm focus:border-cyan-500/50 transition-all text-white placeholder:text-gray-600">
            </div>
            
            <button onclick="analyzeVideo()" id="btnText" class="btn-rainbow w-full py-5 rounded-2xl font-black text-[10px] uppercase tracking-[4px] text-white shadow-xl hover:scale-[1.02] active:scale-95 transition-transform">
                START ANALYZING
            </button>
        </div>

        <div id="result" class="hidden w-full mt-10 scale-up-center">
            <div class="bg-white/5 border border-white/10 p-8 rounded-[32px] backdrop-blur-3xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 to-purple-500"></div>
                <div id="downloadButtons" class="flex flex-col gap-4"></div>
                <p class="mt-4 text-[10px] text-gray-500 italic">Tip: If download doesn't start, long press and click "Download Link"</p>
            </div>
        </div>

        <div class="flex gap-8 mt-16 opacity-30">
            <i class="fa-brands fa-tiktok text-2xl"></i>
            <i class="fa-brands fa-instagram text-2xl"></i>
            <i class="fa-brands fa-youtube text-2xl"></i>
            <i class="fa-brands fa-facebook text-2xl"></i>
        </div>
    </main>

    <footer class="py-12 text-[8px] text-gray-800 font-bold uppercase tracking-[8px]">Powered by RapidAPI • 2026</footer>

    <script>
    async function analyzeVideo() {
        const urlInput = document.getElementById('urlInput');
        const btnText = document.getElementById('btnText');
        const resultDiv = document.getElementById('result');
        const downloadButtons = document.getElementById('downloadButtons');

        if (!urlInput.value.trim()) {
            alert("Pehle link paste karein!");
            return;
        }

        btnText.innerHTML = '<i class="fa-solid fa-spinner animate-spin mr-2"></i> SEARCHING...';
        btnText.disabled = true;
        resultDiv.classList.add('hidden');

        try {
            const response = await fetch('https://auto-download-all-in-one.p.rapidapi.com/v1/social/autolink', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-rapidapi-host': 'auto-download-all-in-one.p.rapidapi.com',
                    'x-rapidapi-key': '0733c17d56mshbb4fd563fb1aad0p15cca4jsnb616ddd8461e'
                },
                body: JSON.stringify({ url: urlInput.value.trim() })
            });

            const res = await response.json();

            if (res.medias && res.medias.length > 0) {
                resultDiv.classList.remove('hidden');
                downloadButtons.innerHTML = '<p class="text-cyan-400 text-[10px] font-black mb-6 uppercase tracking-[3px]">Quality Options Found:</p>';

                res.medias.forEach(item => {
                    const isHigh = item.quality.includes('1080') || item.quality.includes('2160') || item.quality.includes('4K');
                    
                    // Direct Download Attempt using 'download' attribute
                    downloadButtons.innerHTML += `
                        <a href="${item.url}" 
                           download="video_${item.quality}.mp4"
                           target="_self"
                           class="w-full py-5 ${isHigh ? 'bg-cyan-500 text-black shadow-lg shadow-cyan-500/20' : 'bg-white/5 text-white border border-white/10'} rounded-2xl font-black text-xs uppercase tracking-widest transition-all flex justify-between px-8 items-center group">
                            <span class="flex flex-col items-start leading-tight">
                                <span>${item.quality} ${item.extension.toUpperCase()}</span>
                                <span class="text-[8px] opacity-60">${isHigh ? 'Ultra High Definition' : 'Standard Quality'}</span>
                            </span>
                            <i class="fa-solid fa-arrow-down group-hover:translate-y-1 transition-transform"></i>
                        </a>
                    `;
                });
                resultDiv.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("No download links found for this video.");
            }
        } catch (err) {
            alert("Server Error! Check connection.");
        } finally {
            btnText.innerText = "START ANALYZING";
            btnText.disabled = false;
        }
    }
    </script>
</body>
</html>
