<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST VIDEO | Premium 4K Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #050505;
            /* Modern Modified Look: Deep Mesh Gradient */
            background-image: 
                radial-gradient(at 0% 0%, rgba(34, 211, 238, 0.12) 0px, transparent 40%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.12) 0px, transparent 40%),
                linear-gradient(to bottom, #050505, #0a0a0f);
            color: white;
            min-height: 100vh;
        }

        .brand-font { font-family: 'Orbitron', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-rainbow {
            background: linear-gradient(-45deg, #FF3D00, #FFD600, #00E676, #00B0FF, #D500F9);
            background-size: 400% 400%;
            animation: gradientMove 6s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="flex flex-col items-center px-6">

    <header class="w-full max-w-lg py-10 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-cyan-500 p-2 rounded-xl shadow-[0_0_20px_rgba(6,182,212,0.4)]">
                <i class="fa-solid fa-bolt-lightning text-black text-lg"></i>
            </div>
            <span class="brand-font text-2xl font-black italic tracking-tighter uppercase">Fast<span class="text-cyan-400">Video</span></span>
        </div>
        <div class="text-[9px] font-black text-gray-600 uppercase tracking-[4px]">Turbo v2.5</div>
    </header>

    <main class="w-full max-w-lg">
        <div class="glass p-8 rounded-[40px] text-center mb-10 shadow-2xl">
            <h1 class="text-5xl font-black mb-8 leading-[0.9] tracking-tighter uppercase">Instant <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 italic">Downloads.</span></h1>
            
            <input type="text" id="urlInput" placeholder="Paste video link here..." 
                class="w-full bg-black/50 border border-white/5 p-5 rounded-2xl outline-none mb-4 text-center text-sm focus:border-cyan-500 transition-all">
            
            <button onclick="analyzeVideo()" id="btnText" class="btn-rainbow w-full py-5 rounded-2xl font-black text-[10px] uppercase tracking-[4px] text-white shadow-xl active:scale-95 transition-all">
                START ANALYZING
            </button>
        </div>

        <div id="result" class="hidden">
            <div class="glass p-8 rounded-[40px] relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-400 to-purple-600"></div>
                <div id="downloadButtons" class="flex flex-col gap-4"></div>
            </div>
        </div>
    </main>

    <script>
    // THE ULTIMATE 1-CLICK FIX (USING BLOB + PROXY)
    async function forceDownload(videoUrl, filename, btn) {
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> SAVING...';
        btn.style.pointerEvents = "none";

        try {
            // Hum aik Proxy use kar rahe hain taake browser block na kare
            const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(videoUrl);
            
            const response = await fetch(proxyUrl);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename || 'fast_video.mp4';
            document.body.appendChild(a);
            a.click();
            
            document.body.removeChild(a);
            window.URL.revokeObjectURL(blobUrl);
        } catch (e) {
            // Agar proxy fail ho (bohot bari file par), toh direct open karein
            window.open(videoUrl, '_blank');
        } finally {
            btn.innerHTML = originalHtml;
            btn.style.pointerEvents = "auto";
        }
    }

    async function analyzeVideo() {
        const urlInput = document.getElementById('urlInput');
        const btnText = document.getElementById('btnText');
        const resultDiv = document.getElementById('result');
        const downloadButtons = document.getElementById('downloadButtons');

        if (!urlInput.value.trim()) return alert("Please paste a link!");

        btnText.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> FETCHING...';
        btnText.disabled = true;
        resultDiv.classList.add('hidden');

        try {
            const response = await fetch('https://auto-download-all-in-one.p.rapidapi.com/v1/social/autolink', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-rapidapi-host': 'auto-download-all-in-one.p.rapidapi.com',
                    'x-rapidapi-key': '0733c17d56mshbb4fd563fb1aad0p15cca4jsnb616ddd8461e'
                },
                body: JSON.stringify({ url: urlInput.value.trim() })
            });

            const res = await response.json();

            if (res.medias && res.medias.length > 0) {
                resultDiv.classList.remove('hidden');
                downloadButtons.innerHTML = '<p class="text-[10px] text-center font-bold text-gray-500 uppercase tracking-[4px] mb-6">Quality Options Found</p>';

                res.medias.forEach((item, index) => {
                    const isHigh = item.quality.includes('1080') || item.quality.includes('4K');
                    downloadButtons.innerHTML += `
                        <button onclick="forceDownload('${item.url}', 'FastVideo_${item.quality}.mp4', this)" 
                           class="w-full py-5 ${isHigh ? 'bg-cyan-500 text-black shadow-lg shadow-cyan-500/20' : 'bg-white/5 text-white border border-white/10'} rounded-2xl font-black text-[11px] uppercase tracking-widest transition-all flex justify-between px-8 items-center group">
                            <span>${item.quality} ${item.extension.toUpperCase()}</span>
                            <i class="fa-solid fa-download group-hover:translate-y-1 transition-transform"></i>
                        </button>
                    `;
                });
                resultDiv.scrollIntoView({ behavior: 'smooth' });
            } else { alert("Link not found!"); }
        } catch (err) { alert("API Error!"); } finally {
            btnText.innerHTML = 'START ANALYZING';
            btnText.disabled = false;
        }
    }
    </script>
</body>
</html>
