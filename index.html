<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST VIDEO | Pro Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Inter:wght@400;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .brand-font { font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }

        /* Compact Rainbow Button */
        .unique-btn {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 5s ease infinite;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .unique-btn:active { transform: scale(0.95); }

        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .glass-input:focus {
            border-color: #23a6d5;
            background: rgba(255, 255, 255, 0.07);
        }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center px-6 py-4 max-w-5xl mx-auto w-full">
        <div class="brand-font text-lg font-bold tracking-tighter">
            FAST <span class="text-cyan-400">VIDEO</span>
        </div>
        <div class="text-[10px] uppercase tracking-widest text-gray-500 font-bold">
            v1.0 Pro
        </div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center px-6 text-center">
        <span class="bg-white/5 text-cyan-400 border border-cyan-400/20 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4">
            AI Powered Engine
        </span>

        <h1 class="text-4xl md:text-6xl font-black mb-3 brand-font">
            SMART <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 text-5xl md:text-7xl">FETCH.</span>
        </h1>
        
        <p class="text-gray-400 text-sm max-w-xs mb-8">Download high-quality videos from any platform instantly.</p>

        <div class="w-full max-w-md space-y-3">
            <input type="text" id="urlInput" placeholder="Paste link here..." 
                   class="w-full glass-input p-4 rounded-xl outline-none text-base text-center">
            
            <button onclick="analyzeVideo()" id="btnText" class="unique-btn w-full py-4 rounded-xl font-bold text-sm uppercase tracking-wider text-white">
                <i class="fa-solid fa-bolt-lightning mr-2"></i> Analyze Link
            </button>
        </div>

        <div id="result" class="mt-8 hidden w-full max-w-md">
            <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                <p id="videoTitle" class="text-cyan-400 font-semibold mb-3 text-sm uppercase tracking-tight">Processing...</p>
                <div id="downloadButtons"></div>
            </div>
        </div>
    </main>

    <footer class="py-8 text-center text-gray-600 text-[9px] tracking-[3px] uppercase">
        © 2026 FAST VIDEO TOOL
    </footer>

    <script src="script.js"></script>
</body>
</html>
