<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST VIDEO | Pro Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Plus+Jakarta+Sans:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; min-height: 100vh; }
        .brand-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-rainbow {
            background: linear-gradient(-45deg, #FF3D00, #FFD600, #00E676, #00B0FF, #D500F9);
            background-size: 400% 400%;
            animation: gradientMove 6s ease infinite;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="flex flex-col items-center">

    <header class="w-full max-w-5xl px-6 py-6 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="brand-font text-xl font-black italic tracking-tighter text-cyan-400">FAST VIDEO</span>
        </div>
        <div class="text-[10px] uppercase font-bold text-gray-500">v1.0 Pro</div>
    </header>

    <main class="flex-1 flex flex-col items-center px-6 pt-10 text-center w-full max-w-lg">
        <div class="glass px-4 py-1.5 rounded-full flex items-center gap-2 mb-6">
            <span class="text-[9px] font-bold uppercase tracking-[2px] text-cyan-400">1000+ Platforms Supported</span>
        </div>

        <h1 class="text-4xl md:text-6xl font-black mb-4">Download <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">Any Video.</span></h1>
        
        <div class="w-full glass p-5 rounded-[28px] mt-6">
            <input type="text" id="urlInput" placeholder="Paste link here..." 
                class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl outline-none mb-4 text-center text-sm focus:border-cyan-500 transition-all">
            
            <button onclick="analyzeVideo()" id="btnText" class="btn-rainbow w-full py-4 rounded-2xl font-black text-xs uppercase tracking-widest text-white shadow-xl">
                ANALYZE LINK
            </button>
        </div>

        <div id="result" class="hidden w-full mt-8">
            <div class="bg-white/5 border border-white/10 p-6 rounded-[28px] backdrop-blur-xl">
                <div id="downloadButtons" class="flex flex-col gap-3"></div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4 mt-12 w-full">
            <div class="text-center"><p class="text-xl font-bold brand-font">4K</p><p class="text-[8px] text-gray-500 uppercase">Quality</p></div>
            <div class="text-center"><p class="text-xl font-bold brand-font">FAST</p><p class="text-[8px] text-gray-500 uppercase">Speed</p></div>
            <div class="text-center"><p class="text-xl font-bold brand-font">FREE</p><p class="text-[8px] text-gray-500 uppercase">Access</p></div>
        </div>
    </main>

    <footer class="py-10 text-[9px] text-gray-800 tracking-[5px]">FAST VIDEO TOOL © 2026</footer>

    <script>
    async function analyzeVideo() {
        const urlInput = document.getElementById('urlInput');
        const btnText = document.getElementById('btnText');
        const resultDiv = document.getElementById('result');
        const downloadButtons = document.getElementById('downloadButtons');

        if (!urlInput.value.trim()) {
            alert("Please paste a link first!");
            return;
        }

        btnText.innerText = "PROCESSING...";
        btnText.disabled = true;
        resultDiv.classList.add('hidden');

        try {
            const response = await fetch('https://snap-video3.p.rapidapi.com/download', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'x-rapidapi-host': 'snap-video3.p.rapidapi.com',
                    'x-rapidapi-key': '0733c17d56mshbb4fd563fb1aad0p15cca4jsnb616ddd8461e'
                },
                body: new URLSearchParams({ 'url': urlInput.value.trim() })
            });

            const res = await response.json();
            console.log("Response Data:", res);

            // Updated Extraction Logic for snap-video3
            let downloadUrl = "";
            if (res.data) {
                // Checking all possible keys in the response
                downloadUrl = res.data.hd_video || res.data.video || res.data.url || res.data.link || (res.data.medias && res.data.medias[0].url);
            }

            if (downloadUrl) {
                resultDiv.classList.remove('hidden');
                downloadButtons.innerHTML = `
                    <p class="text-cyan-400 text-[10px] font-bold mb-4 uppercase tracking-[2px]">Video Ready to Download</p>
                    <a href="${downloadUrl}" target="_blank" class="w-full py-4 bg-cyan-500 text-black font-black rounded-xl block text-center shadow-lg transition transform active:scale-95">
                        <i class="fa-solid fa-cloud-arrow-down mr-2"></i> DOWNLOAD MP4 HD
                    </a>
                `;
                resultDiv.scrollIntoView({ behavior: 'smooth' });
            } else {
                // If API returns success but no link
                alert("API Busy! Please try again in 5 seconds or use a different video link.");
            }
        } catch (err) {
            alert("Connection Error! Please check your internet.");
        } finally {
            btnText.innerText = "ANALYZE LINK";
            btnText.disabled = false;
        }
    }
    </script>
</body>
</html>
