<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST VIDEO DOWNLOADER | Best 4K Video Downloader Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #050505;
            background-image: 
                radial-gradient(at 0% 0%, rgba(34, 211, 238, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            color: white;
            min-height: 100vh;
        }

        .brand-font { font-family: 'Orbitron', sans-serif; }
        
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .rainbow-text {
            background: linear-gradient(to right, #FF3D00, #FFD600, #00E676, #00B0FF, #D500F9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: moveGradient 4s linear infinite;
        }

        .btn-rainbow {
            background: linear-gradient(-45deg, #FF3D00, #FFD600, #00E676, #00B0FF, #D500F9);
            background-size: 400% 400%;
            animation: moveGradient 6s ease infinite;
            border: 2px solid rgba(255,255,255,0.1);
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .premium-border {
            border-bottom: 1px solid transparent;
            border-image: linear-gradient(to right, transparent, #22d3ee, transparent) 1;
        }
    </style>
</head>
<body class="flex flex-col">

    <header class="w-full max-w-6xl mx-auto px-6 py-8 flex justify-between items-center premium-border">
        <div class="flex flex-col">
            <div class="flex items-center gap-2">
                <div class="bg-cyan-500 p-1.5 rounded shadow-[0_0_15px_rgba(6,182,212,0.5)]">
                    <i class="fa-solid fa-bolt text-black text-sm"></i>
                </div>
                <span class="brand-font text-xl font-black italic tracking-tighter">FAST <span class="text-cyan-400">VIDEO</span></span>
            </div>
            <span class="text-[9px] font-bold text-gray-500 uppercase tracking-[4px] ml-9">Downloader</span>
        </div>
        <div class="flex gap-4 opacity-50">
            <i class="fa-solid fa-shield-halved text-cyan-400"></i>
            <i class="fa-solid fa-crown text-yellow-500"></i>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center px-6 pt-12 pb-20">
        <div class="glass px-5 py-2 rounded-full flex items-center gap-2 mb-8 border-cyan-500/20">
            <span class="text-[10px] font-black uppercase tracking-[3px] rainbow-text">Pro 4K Technology</span>
        </div>

        <h1 class="text-5xl md:text-7xl font-black text-center leading-[0.9] mb-6 tracking-tighter uppercase">
            Fast Video <br> 
            <span class="italic rainbow-text">Downloader Pro.</span>
        </h1>

        <div class="w-full max-w-lg glass p-7 rounded-[40px] shadow-2xl relative">
            <div class="relative mb-5 group">
                <i class="fa-solid fa-link absolute left-5 top-1/2 -translate-y-1/2 text-gray-600 group-focus-within:text-cyan-400 transition-all"></i>
                <input type="text" id="urlInput" placeholder="Paste link here..." 
                    class="w-full bg-black/60 border border-white/5 p-5 pl-14 rounded-3xl outline-none focus:border-cyan-500/30 transition-all text-sm">
            </div>

            <button onclick="analyzeVideo()" id="btnText" class="btn-rainbow w-full py-6 rounded-3xl font-black text-[11px] uppercase tracking-[5px] text-white flex items-center justify-center gap-3 group">
                <span class="group-hover:scale-110 transition-transform flex items-center gap-2">
                    <i class="fa-solid fa-magnifying-glass-chart"></i> Analyze Video
                </span>
            </button>
        </div>

        <div class="grid grid-cols-3 gap-6 mt-16 text-center w-full max-w-md">
            <div class="flex flex-col gap-1">
                <p class="text-2xl font-black brand-font rainbow-text">1000+</p>
                <p class="text-[8px] text-gray-600 uppercase font-black tracking-widest">Sites</p>
            </div>
            <div class="flex flex-col gap-1 border-x border-white/5">
                <p class="text-2xl font-black brand-font rainbow-text">4K</p>
                <p class="text-[8px] text-gray-600 uppercase font-black tracking-widest">Quality</p>
            </div>
            <div class="flex flex-col gap-1">
                <p class="text-2xl font-black brand-font rainbow-text">FAST</p>
                <p class="text-[8px] text-gray-600 uppercase font-black tracking-widest">Server</p>
            </div>
        </div>

        <div id="result" class="mt-12 hidden w-full max-w-lg">
            <div class="glass p-8 rounded-[40px] relative overflow-hidden border-cyan-500/20">
                <div class="absolute top-0 left-0 w-full h-[2px] btn-rainbow"></div>
                <p class="text-cyan-400 font-black mb-6 text-center text-[10px] uppercase tracking-[4px]">Download Ready</p>
                <div id="downloadButtons" class="flex flex-col gap-4"></div>
            </div>
        </div>
    </main>

    <script>
    // 1-CLICK SUCCESS WITH BACKEND TUNNEL
    async function startDownload(videoUrl, filename, btn) {
        const original = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Saving...';
        
        // Aapka Render Backend Link
        const BACKEND_URL = "https://fast-download-api.onrender.com"; 
        
        // Final Download URL through your tunnel
        const finalUrl = `${BACKEND_URL}/download?url=${encodeURIComponent(videoUrl)}&filename=${encodeURIComponent(filename)}`;
        
        // Force Trigger
        window.location.href = finalUrl;

        setTimeout(() => {
            btn.innerHTML = original;
        }, 4000);
    }

    async function analyzeVideo() {
        const urlInput = document.getElementById('urlInput');
        const btnText = document.getElementById('btnText');
        const resultDiv = document.getElementById('result');
        const downloadButtons = document.getElementById('downloadButtons');

        if (!urlInput.value.trim()) return alert("Paste link first!");

        btnText.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin mr-2"></i> Analyzing...';
        btnText.disabled = true;
        resultDiv.classList.add('hidden');

        try {
            const response = await fetch('https://auto-download-all-in-one.p.rapidapi.com/v1/social/autolink', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-rapidapi-host': 'auto-download-all-in-one.p.rapidapi.com',
                    'x-rapidapi-key': '0733c17d56mshbb4fd563fb1aad0p15cca4jsnb616ddd8461e'
                },
                body: JSON.stringify({ url: urlInput.value.trim() })
            });

            const res = await response.json();

            if (res.medias && res.medias.length > 0) {
                resultDiv.classList.remove('hidden');
                downloadButtons.innerHTML = '';

                res.medias.forEach((item, index) => {
                    const isHD = item.quality.includes('1080') || item.quality.includes('4K');
                    downloadButtons.innerHTML += `
                        <button onclick="startDownload('${item.url}', 'FastVideo_${item.quality}.mp4', this)" 
                           class="w-full py-5 ${isHD ? 'bg-cyan-500 text-black shadow-lg shadow-cyan-500/20' : 'bg-white/5 text-white border border-white/10'} rounded-3xl font-black text-[10px] uppercase tracking-widest transition-all flex justify-between px-8 items-center group">
                            <span>${item.quality} ${item.extension.toUpperCase()}</span>
                            <i class="fa-solid fa-download group-hover:translate-y-1 transition-transform"></i>
                        </button>
                    `;
                });
                resultDiv.scrollIntoView({ behavior: 'smooth' });
            } else { alert("Link not found!"); }
        } catch (err) { alert("API Error!"); } finally {
            btnText.innerHTML = '<span class="flex items-center gap-2"><i class="fa-solid fa-magnifying-glass-chart"></i> Analyze Video</span>';
            btnText.disabled = false;
        }
    }
    </script>
</body>
</html>
