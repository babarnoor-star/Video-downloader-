<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST VIDEO | Premium 4K Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* New Modified Background Look */
            background: #050505;
            background-image: 
                radial-gradient(at 0% 0%, rgba(34, 211, 238, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 50% 100%, rgba(15, 15, 15, 1) 0px, transparent 50%);
            color: white;
            min-height: 100vh;
        }

        .brand-font { font-family: 'Orbitron', sans-serif; }
        
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .btn-rainbow {
            background: linear-gradient(-45deg, #FF3D00, #FFD600, #00E676, #00B0FF, #D500F9);
            background-size: 400% 400%;
            animation: gradientMove 6s ease infinite;
            transition: 0.3s;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .platform-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 5px 14px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body class="flex flex-col">

    <header class="w-full max-w-6xl mx-auto px-6 py-8 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-br from-cyan-400 to-blue-600 p-2.5 rounded-xl shadow-[0_0_20px_rgba(6,182,212,0.3)]">
                <i class="fa-solid fa-bolt text-black text-lg"></i>
            </div>
            <span class="brand-font text-2xl font-black italic tracking-tighter">FAST<span class="text-cyan-400">VIDEO</span></span>
        </div>
        <div class="glass px-4 py-1.5 rounded-full border-cyan-500/20">
            <span class="text-[10px] font-black text-cyan-400 tracking-widest uppercase">v2.0 Turbo</span>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center px-6 pt-10 pb-20">
        
        <h1 class="text-6xl md:text-8xl font-black text-center leading-[0.85] mb-6 tracking-tighter">
            INSTANT <br> 
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 italic">SAVER.</span>
        </h1>
        
        <div class="flex flex-wrap justify-center gap-2 mb-12 opacity-60">
            <span class="platform-badge">TikTok</span>
            <span class="platform-badge">Insta</span>
            <span class="platform-badge">FB</span>
            <span class="platform-badge">YT</span>
        </div>

        <div class="w-full max-w-lg glass p-7 rounded-[40px]">
            <div class="relative mb-5">
                <i class="fa-solid fa-link absolute left-5 top-1/2 -translate-y-1/2 text-cyan-500/50"></i>
                <input type="text" id="urlInput" placeholder="Paste link here..." 
                    class="w-full bg-black/60 border border-white/5 p-5 pl-14 rounded-2xl outline-none focus:border-cyan-500/50 transition-all text-sm placeholder:text-gray-700">
            </div>

            <button onclick="analyzeVideo()" id="btnText" class="btn-rainbow w-full py-5 rounded-2xl font-black text-xs uppercase tracking-[4px] text-white shadow-2xl active:scale-95 transition-transform">
                START FETCHING
            </button>
        </div>

        <div id="result" class="mt-12 hidden w-full max-w-lg">
            <div class="glass p-8 rounded-[40px] relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-400 to-purple-600"></div>
                <p class="text-gray-500 font-bold mb-6 text-center text-[10px] uppercase tracking-[4px]">Links Generated</p>
                <div id="downloadButtons" class="flex flex-col gap-4"></div>
            </div>
        </div>

        <div class="mt-16 text-[9px] text-gray-800 font-bold uppercase tracking-[10px]">Secure & Private</div>
    </main>

    <script>
    // THE ULTIMATE 1-CLICK DOWNLOADER
    async function startDownload(videoUrl, filename, button) {
        const originalHtml = button.innerHTML;
        button.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin mr-2"></i> SAVING TO DEVICE...';
        button.style.pointerEvents = 'none';

        try {
            const response = await fetch(videoUrl);
            if (!response.ok) throw new Error('Download failed');
            
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.href = blobUrl;
            link.download = filename || 'video_fast_download.mp4';
            document.body.appendChild(link);
            link.click();
            
            // Cleanup
            document.body.removeChild(link);
            window.URL.revokeObjectURL(blobUrl);
        } catch (error) {
            // Final Backup if fetch fails due to security
            window.location.href = videoUrl;
        } finally {
            button.innerHTML = originalHtml;
            button.style.pointerEvents = 'auto';
        }
    }

    async function analyzeVideo() {
        const urlInput = document.getElementById('urlInput');
        const btnText = document.getElementById('btnText');
        const resultDiv = document.getElementById('result');
        const downloadButtons = document.getElementById('downloadButtons');

        if (!urlInput.value.trim()) return alert("Link please!");

        btnText.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> ANALYZING...';
        btnText.disabled = true;
        resultDiv.classList.add('hidden');

        try {
            const response = await fetch('https://auto-download-all-in-one.p.rapidapi.com/v1/social/autolink', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-rapidapi-host': 'auto-download-all-in-one.p.rapidapi.com',
                    'x-rapidapi-key': '0733c17d56mshbb4fd563fb1aad0p15cca4jsnb616ddd8461e'
                },
                body: JSON.stringify({ url: urlInput.value.trim() })
            });

            const res = await response.json();

            if (res.medias && res.medias.length > 0) {
                resultDiv.classList.remove('hidden');
                downloadButtons.innerHTML = '';

                res.medias.forEach((item, index) => {
                    const isHD = item.quality.includes('1080') || item.quality.includes('4K');
                    const fileName = `FastVideo_${item.quality}.mp4`;
                    
                    downloadButtons.innerHTML += `
                        <button onclick="startDownload('${item.url}', '${fileName}', this)" 
                           class="w-full py-5 ${isHD ? 'bg-cyan-500 text-black shadow-lg shadow-cyan-500/20' : 'bg-white/5 text-white border border-white/10'} rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all flex justify-between px-8 items-center group">
                            <span>${item.quality} ${item.extension.toUpperCase()}</span>
                            <i class="fa-solid fa-download group-hover:translate-y-1 transition-transform"></i>
                        </button>
                    `;
                });
                resultDiv.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("No links found!");
            }
        } catch (err) {
            alert("Connection error!");
        } finally {
            btnText.innerHTML = 'START FETCHING';
            btnText.disabled = false;
        }
    }
    </script>
</body>
</html>
